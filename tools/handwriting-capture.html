<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>handwriting capture — a day in my life</title>
<style>
  :root { --orange: #ff7a18; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #f3f3f0; font-family: ui-sans-serif, system-ui, sans-serif; color: #1a1a1a; overscroll-behavior: none; }
  .wrap { display: flex; flex-direction: column; height: 100%; }
  header { padding: 10px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #ddd; background: #fff; }
  header h1 { font-size: 15px; margin: 0 12px 0 0; font-weight: 600; }
  button { font: inherit; font-size: 13px; padding: 7px 12px; border: 1px solid #ccc; background: #fff; border-radius: 8px; cursor: pointer; }
  button:hover { background: #f0f0f0; }
  button.primary { background: var(--orange); color: #fff; border-color: var(--orange); }
  label.field { font-size: 12px; display: inline-flex; gap: 6px; align-items: center; }
  input[type=number] { width: 64px; padding: 5px; border: 1px solid #ccc; border-radius: 6px; font: inherit; }
  .stage { position: relative; flex: 1; min-height: 0; }
  /* canvas drawn at a fixed art coordinate space; scaled to fit */
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; background:
    linear-gradient(#e8e8e4 1px, transparent 1px) 0 0 / 100% 40px,
    #faf9f6;
    touch-action: none; cursor: crosshair; }
  .hint { position: absolute; left: 50%; top: 14px; transform: translateX(-50%); font-size: 13px; color: #999; pointer-events: none; }
  textarea { width: 100%; height: 120px; font-family: ui-monospace, monospace; font-size: 11px; border: none; border-top: 1px solid #ddd; padding: 10px 16px; resize: vertical; }
  .meta { font-size: 12px; color: #666; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>✍️ write "a day in my life"</h1>
    <button id="undo">Undo stroke</button>
    <button id="clear">Clear</button>
    <label class="field">nib px <input id="weight" type="number" value="14" min="2" max="60" /></label>
    <label class="field">angle° <input id="angle" type="number" value="40" min="-90" max="90" /></label>
    <label class="field">thick <input id="thick" type="number" value="0.35" min="0.05" max="1" step="0.05" /></label>
    <label class="field"><input id="penonly" type="checkbox" checked /> pen only</label>
    <span class="meta" id="meta">0 strokes</span>
    <span style="flex:1"></span>
    <button id="copy">Copy JSON</button>
    <button id="json" class="primary">Download JSON (for site)</button>
    <button id="svg">Download SVG</button>
  </header>
  <div class="stage">
    <canvas id="pad"></canvas>
    <div class="hint" id="hint">draw with your stylus — left → right</div>
  </div>
  <textarea id="out" readonly placeholder="export data appears here"></textarea>
</div>
<script>
// ---- art coordinate space (the exported viewBox). Wide for a one-line phrase.
const ART_W = 1600, ART_H = 400;

const canvas = document.getElementById('pad');
const ctx = canvas.getContext('2d');
const meta = document.getElementById('meta');
const out = document.getElementById('out');
const hint = document.getElementById('hint');
let weight = 14;
let nibAngle = 40;   // degrees — flat-pen orientation
let nibThick = 0.35; // short-edge / long-edge ratio (parallelogram thickness)

// strokes: array of strokes; each stroke = array of {x,y,p,t} in ART space
let strokes = [];
let cur = null;
let dpr = Math.max(1, window.devicePixelRatio || 1);

function resize() {
  const r = canvas.getBoundingClientRect();
  canvas.width = Math.round(r.width * dpr);
  canvas.height = Math.round(r.height * dpr);
  redraw();
}
window.addEventListener('resize', resize);

// map a client point into ART space using object-fit: fill (canvas stretches)
function toArt(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: ((e.clientX - r.left) / r.width) * ART_W,
    y: ((e.clientY - r.top) / r.height) * ART_H,
    p: e.pressure && e.pressure > 0 ? e.pressure : 0.5,
    t: performance.now(),
  };
}
// map ART space -> device canvas pixels
function toPx(pt) {
  return { x: (pt.x / ART_W) * canvas.width, y: (pt.y / ART_H) * canvas.height };
}

// ---- parallelogram (broad calligraphy) nib --------------------------------
// nib is a fixed-orientation parallelogram: a long edge `u` at `nibAngle`, plus
// a short thickness edge `v`. Held at a constant angle, so strokes go thick
// across the angle and thin along it — like a flat-edged pen.
function nibCorners(scale, p) {
  const a = (nibAngle * Math.PI) / 180;
  const w = (weight / ART_W) * canvas.width * (0.65 + 0.7 * p); // px, pressure-scaled
  const hu = { x: Math.cos(a) * w / 2, y: Math.sin(a) * w / 2 };
  const hv = { x: Math.cos(a + Math.PI / 2) * w * nibThick / 2, y: Math.sin(a + Math.PI / 2) * w * nibThick / 2 };
  return [
    { x: -hu.x - hv.x, y: -hu.y - hv.y },
    { x:  hu.x - hv.x, y:  hu.y - hv.y },
    { x:  hu.x + hv.x, y:  hu.y + hv.y },
    { x: -hu.x + hv.x, y: -hu.y + hv.y },
  ];
}

function hull(pts) {
  pts = pts.slice().sort((A, B) => A.x - B.x || A.y - B.y);
  const cross = (O, A, B) => (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
  const lo = [], hi = [];
  for (const p of pts) { while (lo.length >= 2 && cross(lo[lo.length - 2], lo[lo.length - 1], p) <= 0) lo.pop(); lo.push(p); }
  for (let i = pts.length - 1; i >= 0; i--) { const p = pts[i]; while (hi.length >= 2 && cross(hi[hi.length - 2], hi[hi.length - 1], p) <= 0) hi.pop(); hi.push(p); }
  lo.pop(); hi.pop();
  return lo.concat(hi);
}

function fillPoly(poly) {
  ctx.beginPath();
  ctx.moveTo(poly[0].x, poly[0].y);
  for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i].x, poly[i].y);
  ctx.closePath();
  ctx.fill();
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#15171a';
  for (const s of strokes) drawStroke(s);
  if (cur) drawStroke(cur);
}

function drawStroke(s) {
  if (s.length === 1) {
    const a = toPx(s[0]);
    fillPoly(nibCorners(1, s[0].p).map(c => ({ x: a.x + c.x, y: a.y + c.y })));
    return;
  }
  // sweep the nib between consecutive points: fill the convex hull of the nib
  // stamped at both endpoints (a parallelogram band).
  for (let i = 1; i < s.length; i++) {
    const a = toPx(s[i - 1]), b = toPx(s[i]);
    const ca = nibCorners(1, s[i - 1].p), cb = nibCorners(1, s[i].p);
    const band = [
      ...ca.map(c => ({ x: a.x + c.x, y: a.y + c.y })),
      ...cb.map(c => ({ x: b.x + c.x, y: b.y + c.y })),
    ];
    fillPoly(hull(band));
  }
}

let penOnly = true;
document.getElementById('penonly').addEventListener('change', e => penOnly = e.target.checked);
document.getElementById('weight').addEventListener('input', e => { weight = +e.target.value || 14; redraw(); });
document.getElementById('angle').addEventListener('input', e => { nibAngle = +e.target.value || 0; redraw(); });
document.getElementById('thick').addEventListener('input', e => { nibThick = +e.target.value || 0.35; redraw(); });

canvas.addEventListener('pointerdown', e => {
  if (penOnly && e.pointerType === 'touch') return;
  canvas.setPointerCapture(e.pointerId);
  cur = [toArt(e)];
  hint.style.display = 'none';
});
canvas.addEventListener('pointermove', e => {
  if (!cur) return;
  // coalesced events = full stylus resolution
  const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ev of evs) cur.push(toArt(ev));
  redraw();
});
function endStroke(e) {
  if (!cur) return;
  if (cur.length) strokes.push(cur);
  cur = null;
  redraw();
  updateMeta();
}
canvas.addEventListener('pointerup', endStroke);
canvas.addEventListener('pointercancel', endStroke);
canvas.addEventListener('pointerleave', endStroke);

function updateMeta() {
  const pts = strokes.reduce((n, s) => n + s.length, 0);
  meta.textContent = `${strokes.length} strokes · ${pts} pts`;
}

document.getElementById('undo').onclick = () => { strokes.pop(); redraw(); updateMeta(); };
document.getElementById('clear').onclick = () => { strokes = []; redraw(); updateMeta(); hint.style.display = ''; };

// ---- export -------------------------------------------------------------
// Round coords; build one SVG <path> per stroke. Also compute normalized
// timestamps (0..1 over whole phrase) so playback can match writing rhythm.
function buildExport() {
  const t0 = strokes.length ? strokes[0][0].t : 0;
  const tEnd = strokes.length ? strokes[strokes.length - 1].slice(-1)[0].t : 1;
  const span = Math.max(1, tEnd - t0);
  const exStrokes = strokes.map(s => ({
    pts: s.map(pt => [Math.round(pt.x * 10) / 10, Math.round(pt.y * 10) / 10]),
    pressure: s.map(pt => Math.round(pt.p * 100) / 100),
    tStart: (s[0].t - t0) / span,
    tEnd: (s.slice(-1)[0].t - t0) / span,
  }));
  return {
    viewBox: [0, 0, ART_W, ART_H],
    nib: { weight, angle: nibAngle, thick: nibThick },
    strokes: exStrokes,
  };
}

function pathD(pts) {
  if (!pts.length) return '';
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let i = 1; i < pts.length; i++) d += ` L ${pts[i][0]} ${pts[i][1]}`;
  return d;
}

function buildSVG() {
  const data = buildExport();
  const paths = data.strokes.map((s, i) =>
    `  <path d="${pathD(s.pts)}" fill="none" stroke="#15171a" stroke-width="${weight}" stroke-linecap="round" stroke-linejoin="round" data-tstart="${s.tStart.toFixed(4)}" data-tend="${s.tEnd.toFixed(4)}"/>`
  ).join('\n');
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${ART_W} ${ART_H}" data-strokes="${data.strokes.length}" data-nib-angle="${nibAngle}" data-nib-thick="${nibThick}" data-nib-weight="${weight}">\n${paths}\n</svg>\n`;
}

function download(name, text, type) {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('json').onclick = () => {
  const json = JSON.stringify(buildExport());
  out.value = json;
  download('a-day-in-my-life.json', json, 'application/json');
};
document.getElementById('svg').onclick = () => {
  const svg = buildSVG();
  out.value = svg;
  download('a-day-in-my-life.svg', svg, 'image/svg+xml');
};
document.getElementById('copy').onclick = async () => {
  const json = JSON.stringify(buildExport());
  out.value = json;
  try { await navigator.clipboard.writeText(json); } catch {}
};

resize();
</script>
</body>
</html>
